[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "vouqis-verify"
version = "0.1.0"
description = "Verify every AI change before it reaches production"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "typer>=0.12",
    "rich>=13",
    "pydantic>=2",
    "pyyaml>=6",
]

[project.scripts]
vouqis = "vouqis_verify.cli:app"

[project.optional-dependencies]
dev = [
    "pytest>=8",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
