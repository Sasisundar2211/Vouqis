[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "vouqis-verify"
version = "0.1.0"
description = "Verify every AI change before it reaches production"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Vouqis", email = "sasisundhar2211@gmail.com" }]
keywords = ["ai", "evaluation", "github-actions", "llm", "testing", "ci"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Quality Assurance",
    "Topic :: Software Development :: Testing",
]
dependencies = [
    "typer>=0.12",
    "rich>=13",
    "pydantic>=2",
    "pyyaml>=6",
]

[project.urls]
Homepage = "https://vouqis.tech"
Repository = "https://github.com/Sasisundar2211/Vouqis"
"Bug Tracker" = "https://github.com/Sasisundar2211/Vouqis/issues"

[project.scripts]
vouqis = "vouqis_verify.cli:app"

[project.optional-dependencies]
dev = [
    "pytest>=8",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
