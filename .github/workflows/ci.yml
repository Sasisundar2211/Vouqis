name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: vouqis-verify (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]" --quiet
      - run: pytest -q

  dashboard:
    name: dashboard (Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm audit --audit-level=high --omit=dev
      - run: npm run build --workspace=packages/vouqis-dashboard
